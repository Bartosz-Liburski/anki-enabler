services:
  app:
    build: .
    image: anki-enabler
    working_dir: /app
    ports:
      - "4321:4321"
    volumes:
      # Live-reload: host source overlays /app...
      - .:/app
      # ...but keep the container's own node_modules (built under Node 22) isolated
      # from the host's, so a host install under a different Node never shadows it.
      - node_modules:/app/node_modules
    environment:
      # Local dev points at the Supabase stack the `supabase` CLI runs on the host.
      # Override either value via a project-root .env (e.g. SUPABASE_KEY from `make status`).
      SUPABASE_URL: ${SUPABASE_URL:-http://host.docker.internal:54321}
      SUPABASE_KEY: ${SUPABASE_KEY:-}
    extra_hosts:
      # Lets the container reach the host-published Supabase ports (54321, etc.) on Linux.
      - "host.docker.internal:host-gateway"

volumes:
  node_modules:
